services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security_api
    command: /bin/sh -c "alembic upgrade head ; uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security_worker
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: security_beat
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    container_name: security_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: security_monitor
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d security_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: security_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
